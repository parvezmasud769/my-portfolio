let questions = [];

async function getAIQuestions(text) {
    document.getElementById('loading').style.display = 'block';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;

    // সরাসরি এপিআই কল করার জন্য বডি তৈরি
    const requestBody = {
        contents: [{
            parts: [{ text: "Create 5 Bengali MCQs from this text. Return ONLY a valid JSON array. Each object: {\"q\":\"...\",\"options\":[\"...\"],\"correct\":0}. Text: " + text.substring(0, 3000) }]
        }]
    };

    try {
        // সার্ভিস অ্যাকাউন্টের মাধ্যমে বা সরাসরি এপিআই কি দিয়ে (সহজ করার জন্য কি প্রয়োজন হতে পারে)
        // কনসোলে এপিআই এনাবল থাকায় এটি কাজ করার কথা
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody)
        });

        const data = await response.json();
        const resultText = data.candidates[0].content.parts[0].text;
        
        const jsonStart = resultText.indexOf('[');
        const jsonEnd = resultText.lastIndexOf(']') + 1;
        questions = JSON.parse(resultText.substring(jsonStart, jsonEnd));
        
        renderQuiz();
    } catch (error) {
        console.error("Error:", error);
        alert("AI প্রশ্ন তৈরি করতে পারছে না। অনুগ্রহ করে এপিআই সেটিংস চেক করুন।");
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = "";
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = "quiz-box";
        div.innerHTML = `<strong>${index + 1}. ${q.q}</strong>`;
        q.options.forEach((opt, i) => {
            const btn = document.createElement('span');
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => alert(i === q.correct ? "সঠিক উত্তর!" : "ভুল উত্তর।");
            div.appendChild(btn);
        });
        container.appendChild(div);
    });
}
