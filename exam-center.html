<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI কুইজ সেন্টার</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        select { padding: 10px; width: 100%; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ddd; }
        .quiz-box { text-align: left; margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; }
        .option { display: block; margin: 8px 0; padding: 12px; background: #fff; border: 1px solid #ddd; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .option:hover { background: #e7f3ff; border-color: #2196F3; }
        #loading { display: none; color: #2196F3; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI কুইজ সেন্টার</h1>
    
    <select id="chapterSelect" onchange="loadChapterContent(this.value)">
        <option value="">একটি অধ্যায় নির্বাচন করুন</option>
        <option value="chapter1.txt">অধ্যায় ১</option>
        <option value="chapter2.txt">অধ্যায় ২</option>
    </select>

    <div id="loading">AI প্রশ্ন তৈরি করছে... একটু অপেক্ষা করুন।</div>
    <div id="quiz-container">
        <p>অধ্যায় নির্বাচন করলে এখানে অটোমেটিক কুইজ তৈরি হবে।</p>
    </div>
</div>

<script>
const CONFIG = {
    // এখানে আপনার Google Cloud থেকে তৈরি করা API Key-টি বসান
    API_KEY: "আপনার_এপিআই_কি_এখানে_দিন", 
    GH_USER: "parvezmasud769",
    GH_REPO: "my-portfolio",
    GH_FOLDER: "books"
};

async function loadChapterContent(fileName) {
    if (!fileName) return;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('quiz-container').innerHTML = "";

    const url = `https://raw.githubusercontent.com/${CONFIG.GH_USER}/${CONFIG.GH_REPO}/main/${CONFIG.GH_FOLDER}/${fileName}`;
    
    try {
        const response = await fetch(url);
        const text = await response.text();
        getAIQuestions(text);
    } catch (error) {
        alert("ফাইলটি পাওয়া যায়নি। আপনার GitHub ফোল্ডার চেক করুন।");
        document.getElementById('loading').style.display = 'none';
    }
}

async function getAIQuestions(text) {
    const aiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`;
    
    const body = {
        contents: [{ parts: [{ text: "Create 5 Bengali MCQs from this text. Return ONLY a valid JSON array. Format: [{\"q\":\"প্রশ্ন\",\"options\":[\"ক\",\"খ\",\"গ\",\"ঘ\"],\"correct\":0}]. Text: " + text.substring(0, 3000) }] }]
    };

    try {
        const response = await fetch(aiUrl, { method: "POST", body: JSON.stringify(body) });
        const data = await response.json();
        const result = data.candidates[0].content.parts[0].text;
        
        const jsonStart = result.indexOf('[');
        const jsonEnd = result.lastIndexOf(']') + 1;
        const questions = JSON.parse(result.substring(jsonStart, jsonEnd));
        
        renderQuiz(questions);
    } catch (error) {
        alert("AI প্রশ্ন তৈরি করতে পারছে না। আপনার API Key চেক করুন।");
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function renderQuiz(questions) {
    const container = document.getElementById('quiz-container');
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = "quiz-box";
        div.innerHTML = `<strong>${index + 1}. ${q.q}</strong>`;
        q.options.forEach((opt, i) => {
            const span = document.createElement('span');
            span.className = "option";
            span.innerText = opt;
            span.onclick = () => alert(i === q.correct ? "অভিনন্দন! সঠিক উত্তর।" : "দুঃখিত, উত্তরটি ভুল।");
            div.appendChild(span);
        });
        container.appendChild(div);
    });
}
</script>
</body>
</html>
